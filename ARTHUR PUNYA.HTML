// ==========================
// FORMAT ANGKA
// ==========================

function formatNominal(input){

    input.addEventListener("input", function(){

        let angka = this.value.replace(/\D/g,"");

        if(angka==""){

            this.value="";
            return;

        }

        this.value = angka.replace(/\B(?=(\d{3})+(?!\d))/g,",");

    });

}

function hitungBiayaTransfer(){

    const withdraw = document.getElementById("withdraw");
    const saldo = document.getElementById("saldo");
    const fee = document.getElementById("fee");

    if(!withdraw || !saldo || !fee) return;

    function hitung(){

        const total =
            parseInt(withdraw.value.replace(/\D/g,"")) || 0;

        const tampung =
            parseInt(saldo.value.replace(/\D/g,"")) || 0;

        // jika belum isi Total Cair
        if(total===0){

            fee.value="";
            return;

        }

        // jika Ke Tampung masih kosong
        if(tampung===0){

           fee.value = total.toLocaleString("en-US");
            return;

        }

        const hasil = total - tampung;

       fee.value = hasil.toLocaleString("en-US");

    }

    withdraw.addEventListener("input", hitung);

    saldo.addEventListener("input", hitung);

}

function hitungAdminNetzme(){

    const withdraw = document.getElementById("withdraw");
    const admin = document.getElementById("admin");

    if(!withdraw || !admin) return;

    function hitung(){

        const total =
            parseInt(withdraw.value.replace(/\D/g,"")) || 0;

        if(total==0){

            admin.value="";
            return;

        }

        let biaya = 0;

        if(total <= 100000000){

            biaya = 4500;

        }else if(total <= 250000000){

            biaya = 15000;

        }else{

            biaya = 30000;

        }

        admin.value = biaya.toLocaleString("en-US");

        hitungTransferNetzme();

        admin.dispatchEvent(new Event("input"));

    }

    withdraw.addEventListener("input", hitung);

}

function hitungTransferNetzme(){

    const withdraw = document.getElementById("withdraw");
    const saldo    = document.getElementById("saldo");
    const admin    = document.getElementById("admin");
    const fee      = document.getElementById("fee");

    if(!withdraw || !saldo || !admin || !fee) return;

    function hitung(){

        const total =
            parseInt(withdraw.value.replace(/\D/g,"")) || 0;

        const tampung =
            parseInt(saldo.value.replace(/\D/g,"")) || 0;

            // Format ulang Ke Tampung
if(saldo.value !== ""){
    saldo.value = tampung.toLocaleString("en-US");
}

        const biayaAdmin =
            parseInt(admin.value.replace(/\D/g,"")) || 0;

        if(total <= 0){
            fee.value = "";
            return;
        }

        // Rumus utama
        let hasil = total - tampung - biayaAdmin;

        if(hasil < 0) hasil = 0;

        fee.value = hasil.toLocaleString("en-US");

    }

    withdraw.addEventListener("input", hitung);
    saldo.addEventListener("input", hitung);
    admin.addEventListener("input", hitung);

    // Hitung saat pertama kali
    hitung();
}

function hitungTransferVanson(){

    const withdraw = document.getElementById("withdraw");
    const saldo    = document.getElementById("saldo");
    const bank     = document.getElementById("bank");
    const fee      = document.getElementById("fee");

    if(!withdraw || !saldo || !bank || !fee) return;

    function hitung(){

        const total =
            parseInt(withdraw.value.replace(/\D/g,"")) || 0;

        const tampung =
            parseInt(saldo.value.replace(/\D/g,"")) || 0;

        const bankWd =
            parseInt(bank.value.replace(/\D/g,"")) || 0;

        if(total <= 0){
            fee.value = "";
            return;
        }

        let hasil = total - tampung - bankWd;

        if(hasil < 0) hasil = 0;

        fee.value = hasil.toLocaleString("en-US");

    }

    withdraw.addEventListener("input", hitung);
    saldo.addEventListener("input", hitung);
    bank.addEventListener("input", hitung);

    hitung();
}

// ==========================
// FORMAT TANGGAL INDONESIA
// ==========================

function formatTanggal(tanggal){

    const bulan=[
        "JANUARI",
        "FEBRUARI",
        "MARET",
        "APRIL",
        "MEI",
        "JUNI",
        "JULI",
        "AGUSTUS",
        "SEPTEMBER",
        "OKTOBER",
        "NOVEMBER",
        "DESEMBER"
    ];

    const tgl = new Date(tanggal);

    if(isNaN(tgl)) return "";

    return `${tgl.getDate()} ${bulan[tgl.getMonth()]} ${tgl.getFullYear()}`;

}

// ==========================
// TANGGAL OTOMATIS
// ==========================

function isiTanggalOtomatis(){

    const inputTanggal=document.getElementById("tglCair");
    const inputPeriode=document.getElementById("periode");

    if(!inputTanggal || !inputPeriode) return;

    const sekarang=new Date();

    inputTanggal.valueAsDate=sekarang;

    const kemarin=new Date(sekarang);

    kemarin.setDate(kemarin.getDate()-1);

    inputPeriode.value=formatTanggal(kemarin);

    // jika tanggal diganti manual
    inputTanggal.addEventListener("change",function(){

        if(this.value=="") return;

        const tgl=new Date(this.value);

        tgl.setDate(tgl.getDate()-1);

        inputPeriode.value=formatTanggal(tgl);

    });

}

    if(e.key!="Enter") return;

    const input=document.activeElement;

    if(input.tagName!="INPUT") return;

    e.preventDefault();

    const semua=[...document.querySelectorAll("input")];

    const index=semua.indexOf(input);

   if(index<semua.length-1){

    semua[index+1].focus();

}else{

}

});

document.addEventListener("keydown",function(e){
